<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 60px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .delete-btn {
            background-color: #e74c3c;
            padding: 5px 10px;
            font-size: 14px;
            margin-left: 10px;
        }
        #error {
            color: red;
            margin-bottom: 10px;
        }
        #todo-list {
            list-style: none;
            padding: 0;
        }
        #todo-list li {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            border-left: 4px solid #4CAF50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <h1>📝 My Todo List</h1>

    <div class="input-area">
        <input type="text" id="taskInput" placeholder="Enter a task..." />
        <button id="addBtn">Add</button>
    </div>

    <p id="error"></p>
    <p id="taskCount">Total tasks: 0</p>

    <ul id="todo-list"></ul>

    <script src="script.js"></script>
</body>
</html>
